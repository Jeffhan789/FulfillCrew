name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        id: install
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run backend tests
        id: pytest
        run: pytest tests/ -v
        env:
          PYTHONPATH: .

  frontend-tests:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        id: npm-install
        run: |
          cd frontend
          npm install

      - name: Run frontend tests
        id: npm-test
        run: |
          cd frontend
          npm test

      - name: Build frontend
        id: build
        run: |
          cd frontend
          npm run build

  data-cleaning-test:
    name: Data Cleaning Pipeline Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify input data exists
        id: check-input
        run: |
          test -f data_cleaning/raw_products/products.json
          echo "Input products file exists."

      - name: Run data cleaning
        id: data-cleaning
        run: |
          node data_cleaning/data_processing.js             data_cleaning/raw_products/products.json             data_cleaning/cleaned_products/products.json

      - name: Verify cleaned output exists
        if: always()
        run: |
          test -f data_cleaning/cleaned_products/products.json
          echo "Cleaned products file exists."

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: docker-build
        run: docker build -t fulfillcrew-backend .

      - name: Verify Docker image
        if: always()
        run: docker image inspect fulfillcrew-backend
